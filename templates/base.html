<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LMS Portal{% endblock %}</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/style.css" />

  <!-- Per-page extra CSS (optional) -->
  {% block extra_css %}{% endblock %}
</head>

<body class="lms-body">

  <!-- ── Navbar (shared across all logged-in pages) ── -->
  {% include "partials/navbar.html" %}

  <!-- ── Sidebar (filled in by role-specific base templates) ── -->
  {% block sidebar %}{% endblock %}

  <!-- ── Sidebar overlay for mobile ── -->
  <div class="lms-sidebar-overlay d-lg-none" id="sidebarOverlay"></div>

  <!-- ── Main content ── -->
  <main class="lms-main">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Sidebar toggle script (shared) -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggleBtn = document.getElementById('sidebarToggle');

    toggleBtn?.addEventListener('click', () => {
      sidebar.classList.toggle('show');
      overlay.classList.toggle('show');
    });
    overlay?.addEventListener('click', () => {
      sidebar.classList.remove('show');
      overlay.classList.remove('show');
    });
  </script>

  <!-- Per-page extra JS (optional) -->
  {% block extra_js %}{% endblock %}

</body>
</html>
