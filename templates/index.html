<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Language" content="en" />
  <meta name="google" content="notranslate" />
  <title>LMS Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="login-landing notranslate" translate="no">
  <section class="hero-section d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center align-items-center g-4">
        <div class="col-lg-6">
          <div class="pe-lg-4">
            <span class="badge rounded-pill bg-light text-dark border mb-3">Centralized access</span>
            <h1 class="display-5 fw-bold mb-3">Welcome back to LMS Portal</h1>
            <p class="lead text-muted mb-4">
              Sign in once and we'll take you to the right dashboard automatically based on your account role.
            </p>

            <div class="row g-3">
              <div class="col-sm-4">
                <div class="card shadow-sm h-100 border-0">
                  <div class="card-body text-center py-4">
                    <div class="icon-circle student-icon mb-3 mx-auto"><i class="bi bi-mortarboard-fill"></i></div>
                    <div class="fw-semibold">Student</div>
                  </div>
                </div>
              </div>
              <div class="col-sm-4">
                <div class="card shadow-sm h-100 border-0">
                  <div class="card-body text-center py-4">
                    <div class="icon-circle lecturer-icon mb-3 mx-auto"><i class="bi bi-person-workspace"></i></div>
                    <div class="fw-semibold">Lecturer</div>
                  </div>
                </div>
              </div>
              <div class="col-sm-4">
                <div class="card shadow-sm h-100 border-0">
                  <div class="card-body text-center py-4">
                    <div class="icon-circle admin-icon mb-3 mx-auto"><i class="bi bi-shield-lock-fill"></i></div>
                    <div class="fw-semibold">Admin</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-5 col-xl-4">
          <div class="card shadow-lg border-0 p-4 p-md-5">
            <h2 class="text-center mb-2">Login</h2>
            <p class="text-center text-muted small mb-4">Use your email and password to continue.</p>

            {% if has_error %}
            <div class="alert alert-danger" role="alert">
              {{ error_message }}
            </div>
            {% endif %}

            <form method="post" action="/login">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ email_value }}" autocomplete="username" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" autocomplete="current-password" required>
              </div>

              <button type="submit" class="btn btn-primary w-100">Sign in</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
