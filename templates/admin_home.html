<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">LMS Portal</a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <span class="navbar-text text-white">Admin Dashboard</span>
        <form method="post" action="/logout" class="mb-0">
          <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="mb-4">Welcome, {{ display_name }}</h2>

    <div class="row g-4">
      <div class="col-md-6"><div class="card p-3 shadow-sm"><h5>Admin Dashboard</h5><p>Monitor system overview and activity.</p></div></div>
      <div class="col-md-6"><div class="card p-3 shadow-sm"><h5>Settings</h5><p>Manage global system settings and configurations.</p></div></div>
    </div>
  </div>
</body>
</html>
