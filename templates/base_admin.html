{% extends "base.html" %}

{#
	base_admin.html
	Role-specific base for ADMIN pages. Includes the admin sidebar.
#}

{% block extra_css %}
<script>
  (function () {
    try {
      var theme = '{{ preferences.theme_mode | default(value="") }}';
      if (!theme) {
        var cookie = document.cookie.split('; ').find(function (r) { return r.indexOf('lms-theme=') === 0; });
        theme = cookie ? decodeURIComponent(cookie.split('=')[1]) : 'light';
      }
      if (theme === 'dark') {
        document.documentElement.classList.add('theme-dark');
        document.documentElement.setAttribute('data-bs-theme', 'dark');
      } else {
        document.documentElement.classList.remove('theme-dark');
        document.documentElement.setAttribute('data-bs-theme', 'light');
      }
    } catch (e) {}
  })();
</script>
{% endblock %}

{% block sidebar %}
	{% include "partials/sidebar_admin.html" %}
{% endblock %}
